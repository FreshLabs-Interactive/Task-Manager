<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>OnlyGamesUI TODO List</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: "Segoe UI", sans-serif;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1800px;
            margin: auto;
            padding: 20px;
        }

        header {
            background: #0b1eb0;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .subtitle {
            opacity: 0.8;
        }

        .add-task-section {
            background: #1f2937;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        input,
        select,
        button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
        }

        input,
        select {
            background: #111827;
            color: white;
        }

        button {
            background: #0b1eb0;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s ease;
        }

        button:hover {
            background: #1536ff;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .column {
            background: #1f2937;
            border-left: 4px solid #0b1eb0;
            border-radius: 12px;
            padding: 15px;
            min-height: 500px;
        }

        .column-title {
            text-align: center;
            padding-bottom: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .tasks-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task {
            background: #111827;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .priority-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .priority-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .priority-red {
            background: #ef4444;
        }

        .priority-orange {
            background: #f97316;
        }

        .priority-yellow {
            background: #eab308;
        }

        .priority-green {
            background: #22c55e;
        }

        .task-time {
            font-size: 0.8rem;
            opacity: 0.6;
            margin: 10px 0;
        }

        .task-delete {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
        }

        .move-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }

        .move-btn {
            flex: 1;
            min-width: 70px;
            padding: 6px;
            font-size: 0.8rem;
        }

        .btn-blue {
            background: #2563eb;
        }

        .btn-red {
            background: #dc2626;
        }

        .btn-purple {
            background: #7c3aed;
        }

        .btn-green {
            background: #16a34a;
        }

        .empty-column {
            text-align: center;
            opacity: 0.5;
            margin-top: 20px;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            opacity: 0.6;
        }

        @media (max-width: 1200px) {
            .board {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 700px) {
            .board {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <h1>OnlyGamesUI TODO List</h1>
            <p class="subtitle">Created By JFresh</p>
        </header>

        <section class="add-task-section">

            <div class="form-grid">

                <select id="column-select">
                    <option value="todo">ToDo - Add</option>
                    <option value="tofix">Fixes - Bugs</option>
                    <option value="testing">Testing</option>
                    <option value="completed">Completed</option>
                </select>

                <input
                    type="text"
                    id="task-input"
                    placeholder="Enter task..."
                >

                <select id="priority-select">
                    <option value="red">High Priority</option>
                    <option value="orange">Medium Priority</option>
                    <option value="yellow">Low Priority</option>
                    <option value="green">No Priority</option>
                </select>

                <button id="add-task-btn">
                    Add Task
                </button>

            </div>

        </section>

        <div class="board">

            <div class="column">
                <h2 class="column-title">ToDo - Add</h2>
                <div class="tasks-container" id="todo-list"></div>
            </div>

            <div class="column">
                <h2 class="column-title">Fixes - Bugs</h2>
                <div class="tasks-container" id="tofix-list"></div>
            </div>

            <div class="column">
                <h2 class="column-title">Testing</h2>
                <div class="tasks-container" id="testing-list"></div>
            </div>

            <div class="column">
                <h2 class="column-title">Completed</h2>
                <div class="tasks-container" id="completed-list"></div>
            </div>

        </div>

        <footer>
            <p>© 2026 FreshLabs Interactive</p>
            <p>FWYH</p>
        </footer>

    </div>

    <script>
        const STORAGE_KEY = "freshlabs_tasks";

        let savedTasks = JSON.parse(
            localStorage.getItem(STORAGE_KEY)
        );

        let tasks = [];

        if (savedTasks) {

            if (Array.isArray(savedTasks)) {

                tasks = savedTasks;

            } else {

                ["todo", "tofix", "testing", "completed"].forEach(column => {

                    if (Array.isArray(savedTasks[column])) {

                        savedTasks[column].forEach(task => {

                            tasks.push({
                                id: task.id || Date.now(),
                                text: task.text || "",
                                priority: task.priority || "green",
                                column: column,
                                timestamp: task.timestamp || ""
                            });

                        });

                    }

                });

            }

        }

        function saveTasks() {
            localStorage.setItem(
                STORAGE_KEY,
                JSON.stringify(tasks)
            );
        }

        function getPriorityText(priority) {
            switch (priority) {
                case "red":
                    return "High Priority";

                case "orange":
                    return "Medium Priority";

                case "yellow":
                    return "Low Priority";

                default:
                    return "No Priority";
            }
        }

        function getPriorityValue(priority) {
            switch (priority) {
                case "red":
                    return 4;

                case "orange":
                    return 3;

                case "yellow":
                    return 2;

                default:
                    return 1;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement("div");

            div.textContent = text;

            return div.innerHTML;
        }

        function renderTask(task) {
            const div = document.createElement("div");

            div.className = "task";

            div.innerHTML = `
                <div class="task-header">

                    <div class="priority-indicator">
                        <div class="priority-dot priority-${task.priority}"></div>

                        <span>
                            ${getPriorityText(task.priority)}
                        </span>
                    </div>

                    <button
                        class="task-delete"
                        onclick="deleteTask(${task.id})"
                    >
                        ✕
                    </button>

                </div>

                <div>
                    ${escapeHtml(task.text)}
                </div>

                <div class="task-time">
                    ${task.timestamp}
                </div>

                <div class="move-buttons">

                    ${
                        task.column !== "todo"
                            ? `<button class="move-btn btn-blue"
                                onclick="moveTask(${task.id}, 'todo')">
                                ToDo
                               </button>`
                            : ""
                    }

                    ${
                        task.column !== "tofix"
                            ? `<button class="move-btn btn-red"
                                onclick="moveTask(${task.id}, 'tofix')">
                                Fix
                               </button>`
                            : ""
                    }

                    ${
                        task.column !== "testing"
                            ? `<button class="move-btn btn-purple"
                                onclick="moveTask(${task.id}, 'testing')">
                                Testing
                               </button>`
                            : ""
                    }

                    ${
                        task.column !== "completed"
                            ? `<button class="move-btn btn-green"
                                onclick="moveTask(${task.id}, 'completed')">
                                Complete
                               </button>`
                            : ""
                    }

                </div>
            `;

            return div;
        }

        function renderBoard() {

            const columns = {
                todo: document.getElementById("todo-list"),
                tofix: document.getElementById("tofix-list"),
                testing: document.getElementById("testing-list"),
                completed: document.getElementById("completed-list")
            };

            Object.values(columns).forEach(column => {
                column.innerHTML = "";
            });

            const sortedTasks = [...tasks].sort((a, b) => {
                return (
                    getPriorityValue(b.priority) -
                    getPriorityValue(a.priority)
                );
            });

            Object.keys(columns).forEach(columnName => {

                const filteredTasks = sortedTasks.filter(task => {
                    return task.column === columnName;
                });

                if (filteredTasks.length === 0) {
                    columns[columnName].innerHTML =
                        '<div class="empty-column">No tasks</div>';

                    return;
                }

                filteredTasks.forEach(task => {
                    columns[columnName].appendChild(
                        renderTask(task)
                    );
                });

            });

        }

        function addTask() {

            const input =
                document.getElementById("task-input");

            const priority =
                document.getElementById("priority-select").value;

            const column =
                document.getElementById("column-select").value;

            const text = input.value.trim();

            if (text === "") {
                return;
            }

            tasks.push({
                id: Date.now(),
                text,
                priority,
                column,
                timestamp: new Date().toLocaleString()
            });

            saveTasks();
            renderBoard();

            input.value = "";
        }

        function deleteTask(taskId) {

            tasks = tasks.filter(task => {
                return task.id !== taskId;
            });

            saveTasks();
            renderBoard();
        }

        function moveTask(taskId, newColumn) {

            const task = tasks.find(task => {
                return task.id === taskId;
            });

            if (!task) {
                return;
            }

            task.column = newColumn;

            saveTasks();
            renderBoard();
        }

        document
            .getElementById("add-task-btn")
            .addEventListener("click", addTask);

        document
            .getElementById("task-input")
            .addEventListener("keydown", function (e) {

                if (e.key === "Enter") {
                    addTask();
                }

            });

        renderBoard();
    </script>

</body>
</html>
