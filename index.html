<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>FreshLabs Interactive - Task Manager</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: "Segoe UI", sans-serif;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1800px;
            margin: auto;
            padding: 20px;
        }

        header {
            background: #dc2626;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.5rem;
        }

        .subtitle {
            opacity: 0.85;
        }

        .add-task-section {
            background: #1f2937;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        input,
        select,
        button {
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-size: 1rem;
        }

        input,
        select {
            background: #111827;
            color: white;
        }

        button {
            background: #dc2626;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #b91c1c;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .column {
            background: #1f2937;
            border-left: 4px solid #dc2626;
            border-radius: 10px;
            padding: 15px;
            min-height: 500px;
        }

        .column-title {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tasks-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task {
            background: #111827;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .priority-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .priority-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .priority-green {
            background: #22c55e;
        }

        .priority-yellow {
            background: #eab308;
        }

        .priority-orange {
            background: #f97316;
        }

        .priority-red {
            background: #ef4444;
        }

        .task-time {
            font-size: 0.8rem;
            opacity: 0.7;
            margin: 10px 0;
        }

        .task-delete {
            background: transparent;
            color: #ef4444;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .move-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .move-btn {
            flex: 1;
            min-width: 70px;
            padding: 6px;
            font-size: 0.8rem;
        }

        .btn-blue {
            background: #2563eb;
        }

        .btn-red {
            background: #dc2626;
        }

        .btn-purple {
            background: #7c3aed;
        }

        .btn-green {
            background: #16a34a;
        }

        .empty-column {
            text-align: center;
            opacity: 0.6;
            margin-top: 20px;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            opacity: 0.7;
        }

        @media (max-width: 1200px) {
            .board {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 700px) {
            .board {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <header>
            <h1>FreshLabs Interactive</h1>
            <p class="subtitle">OnlyGamesUI TODO List</p> 
        </header>

        <section class="add-task-section">
            <div class="form-grid">

                <select id="column-select">
                    <option value="todo">To Do</option>
                    <option value="tofix">To Fix</option>
                    <option value="testing">Testing</option>
                    <option value="completed">Completed</option>
                </select>

                <input
                    type="text"
                    id="task-input"
                    placeholder="Enter task..."
                >

                <select id="priority-select">
                    <option value="green">No Priority</option>
                    <option value="yellow">Low Priority</option>
                    <option value="orange">Medium Priority</option>
                    <option value="red">High Priority</option>
                </select>

                <button id="add-task-btn">
                    Add Task
                </button>

            </div>
        </section>

        <div class="board">

            <div class="column">
                <h2 class="column-title">To Do</h2>
                <div
                    class="tasks-container"
                    id="todo-list"
                ></div>
            </div>

            <div class="column">
                <h2 class="column-title">To Fix</h2>
                <div
                    class="tasks-container"
                    id="tofix-list"
                ></div>
            </div>

            <div class="column">
                <h2 class="column-title">Testing</h2>
                <div
                    class="tasks-container"
                    id="testing-list"
                ></div>
            </div>

            <div class="column">
                <h2 class="column-title">Completed</h2>
                <div
                    class="tasks-container"
                    id="completed-list"
                ></div>
            </div>

        </div>

        <footer>
            <p>© 2026 FreshLabs Interactive</p>
            <p>FWYH</p>
        </footer>

    </div>

    <script>
        const STORAGE_KEY = "freshlabs_tasks";

        let tasks = JSON.parse(
            localStorage.getItem(STORAGE_KEY)
        ) || {
            todo: [],
            tofix: [],
            testing: [],
            completed: []
        };

        function saveTasks() {
            localStorage.setItem(
                STORAGE_KEY,
                JSON.stringify(tasks)
            );
        }

        function getPriorityText(priority) {
            switch (priority) {
                case "red":
                    return "High Priority";

                case "orange":
                    return "Medium Priority";

                case "yellow":
                    return "Low Priority";

                default:
                    return "No Priority";
            }
        }

        function renderTask(task, columnId) {
            const div = document.createElement("div");

            div.className = "task";

            div.innerHTML = `
                <div class="task-header">
                    <div class="priority-indicator">
                        <div class="priority-dot priority-${task.priority}"></div>

                        <span>
                            ${getPriorityText(task.priority)}
                        </span>
                    </div>

                    <button
                        class="task-delete"
                        onclick="deleteTask('${columnId}', ${task.id})"
                    >
                        ✕
                    </button>
                </div>

                <div>
                    ${escapeHtml(task.text)}
                </div>

                <div class="task-time">
                    ${task.timestamp}
                </div>

                <div class="move-buttons">

                    ${
                        columnId !== "todo"
                            ? `<button class="move-btn btn-blue"
                                onclick="moveTask('${columnId}','todo',${task.id})">
                                To Do
                               </button>`
                            : ""
                    }

                    ${
                        columnId !== "tofix"
                            ? `<button class="move-btn btn-red"
                                onclick="moveTask('${columnId}','tofix',${task.id})">
                                To Fix
                               </button>`
                            : ""
                    }

                    ${
                        columnId !== "testing"
                            ? `<button class="move-btn btn-purple"
                                onclick="moveTask('${columnId}','testing',${task.id})">
                                Testing
                               </button>`
                            : ""
                    }

                    ${
                        columnId !== "completed"
                            ? `<button class="move-btn btn-green"
                                onclick="moveTask('${columnId}','completed',${task.id})">
                                Complete
                               </button>`
                            : ""
                    }

                </div>
            `;

            return div;
        }

        function renderColumn(columnId) {
            const list = document.getElementById(
                `${columnId}-list`
            );

            list.innerHTML = "";

            if (tasks[columnId].length === 0) {
                list.innerHTML =
                    '<div class="empty-column">No tasks</div>';

                return;
            }

            tasks[columnId].forEach(task => {
                list.appendChild(
                    renderTask(task, columnId)
                );
            });
        }

        function renderBoard() {
            renderColumn("todo");
            renderColumn("tofix");
            renderColumn("testing");
            renderColumn("completed");
        }

        function addTask() {
            const input =
                document.getElementById("task-input");

            const priority =
                document.getElementById("priority-select").value;

            const column =
                document.getElementById("column-select").value;

            const text = input.value.trim();

            if (text === "") {
                return;
            }

            tasks[column].push({
                id: Date.now(),
                text,
                priority,
                timestamp: new Date().toLocaleString()
            });

            saveTasks();
            renderBoard();

            input.value = "";
        }

        function deleteTask(columnId, taskId) {
            tasks[columnId] = tasks[columnId].filter(
                task => task.id !== taskId
            );

            saveTasks();
            renderBoard();
        }

        function moveTask(fromColumn, toColumn, taskId) {
            const index = tasks[fromColumn].findIndex(
                task => task.id === taskId
            );

            if (index === -1) {
                return;
            }

            const task = tasks[fromColumn][index];

            tasks[fromColumn].splice(index, 1);
            tasks[toColumn].push(task);

            saveTasks();
            renderBoard();
        }

        function escapeHtml(text) {
            const div = document.createElement("div");

            div.textContent = text;

            return div.innerHTML;
        }

        document
            .getElementById("add-task-btn")
            .addEventListener("click", addTask);

        document
            .getElementById("task-input")
            .addEventListener("keydown", function (e) {
                if (e.key === "Enter") {
                    addTask();
                }
            });

        renderBoard();
    </script>
</body>
</html>
